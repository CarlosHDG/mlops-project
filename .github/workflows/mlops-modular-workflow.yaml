name: MLOps Pipeline

on:
  workflow_dispatch:
    inputs:
      run_all:
        description: 'Run all jobs'
        required: false
        default: 'true'
      run_data_processing:
        description: 'Run data processing job'
        required: false
        default: 'false'
      run_model_training:
        description: 'Run model training job'
        required: false
        default: 'false'
      run_build_and_publish:
        description: 'Run build and publish job'
        required: false
        default: 'false'
  release:
    types: [created]
         
jobs:
  data-processing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.5'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0   
      - name: Install dependencies
        run: uv sync --only-group core --frozen --no-install-project
      
      - name: Run data processing
        run: |
          uv run --no-sync src/data/data_processor.py \
          --input data/raw/house_data.csv \
          --output data/processed/cleaned_house_data.csv
      
      - name: Run feature engineering
        run: |
          uv run --no-sync src/features/features.py \
          --input data/processed/cleaned_house_data.csv \
          --output data/processed/featured_house_data.csv \
          --preprocessor models/trained/preprocessor.pkl
      
      - name: Upload processed data
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: data/processed/featured_house_data.csv
      
      - name: Upload proprocessor
        uses: actions/upload-artifact@v4
        with:
          name: preprocessor
          path: models/trained/preprocessor.pkl
  
  model-training:
    needs: data-processing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.5'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0   
      
      - name: Install dependencies
        run: uv sync --group core --group training --frozen --no-install-project

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: data/processed
      
      - name: Sepup MLflow
        run: |
          docker compose -f deploy/mlflow/compose.yaml up -d
      
      - name: Wait for MLflow to start
        run: |
          for i in {1..10}; do
            curl -f http://localhost:5000/health && break || sleep 5;
          done
      
      - name: Train model
        run: |
          uv run --no-sync src/models/train_model.py \
          --config configs/model_config.yaml \
          --data data/processed/featured_house_data.csv \
          --models-dir models \
          --mlflow-tracking-uri http://localhost:5000

      - name: Upload trained and features model
        uses: actions/upload-artifact@v4
        with:
            name: trained-model
            path: models/
        
      - name: Cleaning up MLflow
        run: |
          docker compose -f deploy/mlflow/compose.yaml down --rmi all

  build-and-publish:
    needs: model-training
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Download trained model and features
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/
          
      - name: Download preprocessor
        uses: actions/download-artifact@v4
        with:
          name: preprocessor
          path: models/trained/
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          pasSword: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/house-price-model:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/house-price-model:latest
          cache-from: type+gha
          cache-to: type=gha, mode=max

      - name: Test Docker image
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/house-price-model:${{ github.sha }}
          docker run -d -p 8000:8000 --name test-api ${{ secrets.DOCKERHUB_USERNAME }}/house-price-model:${{ github.sha }}
          for i in {1..10}; do
            curl -f http://localhost:8000/health && break || sleep 5;
          done
          docker logs test-api
      
      - name: Clean up Test Container
        run: |
          docker stop test-api || true
          docker rm test-api || true